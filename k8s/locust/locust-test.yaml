apiVersion: locust.io/v1
kind: LocustTest
metadata:
  name: online-boutique-test
  namespace: default
  annotations:
    sidecar.istio.io/inject: "false"

spec:
  image: locust-boutique-custom:1.0
  imagePullPolicy: Never
  workers: 1
  args: "--host http://istio-gateway-istio.default.svc.cluster.local"

  locustfile:
    configMap:
      name: locust-script

  master:
    resources:
      requests:
        cpu: "2000m"
        memory: "1Gi"
      limits:
        cpu: "4000m"
        memory: "4Gi"

  worker:
    resources:
      requests:
        cpu: "2000m"
        memory: "1Gi"
      limits:
        cpu: "4000m"
        memory: "4Gi"