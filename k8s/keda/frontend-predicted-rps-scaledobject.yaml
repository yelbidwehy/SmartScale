apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: frontend-predicted-rps-scaler
  namespace: default
spec:
  scaleTargetRef:
    name: frontend
  minReplicaCount: 1
  maxReplicaCount: 10
  pollingInterval: 10
  cooldownPeriod: 60
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        metricName: predicted_replicas_frontend
        query: predicted_replicas{exported_service="frontend"}
        threshold: "1"